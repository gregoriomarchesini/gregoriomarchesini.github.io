---
layout: default
---

<div class="row g-5 mb-5">
  <div class="col-md-6">
    <h3 class="fw-bold">About me</h3>
    {{ content }}
  </div>
  <div class="col-md-6">
    <img src="{{ site.github.url }}/assets/img/IMG_4582-min.jpeg" alt="Home" width="100%">
    <p>
      <i class="fab fa-github"></i>  <a href="https://github.com/gregoriomarchesini" target="_blank">GitHub</a><br>
      <i class="fas fa-graduation-cap"></i><a href="https://scholar.google.com/citations?user=XMflop0AAAAJ&hl=en" target="_blank">Google Scholar</a>
    </p>
  </div>
</div>

{% include publications.html %}

<div class="row g-5 mb-5">
  <div class="col-md-12">
    <h3 class="fw-bold border-bottom pb-3 mb-5">Updates</h3>
    {% for post in site.posts %}
      <p><a href="{{ site.github.url }}/{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%B %-d, %Y" }}</p>
    {% endfor %}
  </div>
</div>
