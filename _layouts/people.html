---
layout: default
---

{{ content }}

<h3 class="fw-bold border-bottom pb-3 mb-5">People</h3>
{% for person in site.data.settings.people %}
<div class="row g-5 mb-5">
  <div class="col-md-6">
    <h5>{{ person.name }}</h5>
    <p>{{ person.title }}</p>
    <p>{{ person.department }}</p>
    <p></p>{{ person.institution }}</p>
    <p><a href="{{person.url}}">Personal Website</a></p>
  </div>
</div>
{% endfor %}
