<style>
  .button {
    background-color: azure;
    border: none;
    color: white;
    padding: 10px 15px; /* Increase padding for bigger buttons */
    text-align: center;
    text-decoration: none;
    display: inline-block;
    font-size: 12px; /* Increase font size for bigger buttons */
    transition-duration: 0.4s;
    cursor: pointer;
    border-radius: 8px;
    border-color: black;
    border-width: thin;
    border-style: solid;
  }

  .button:hover {
    background-color: white;
    color: black;
  }

  .publication {
    margin-bottom: 20px; /* Add margin between publications */
    display: flex;
    border: 1px solid lightgray; /* Add border */
    border-radius: 10px; /* Add border radius */
    padding: 10px; /* Add padding */
  }

  .publication img {
    max-width: 100%; /* Make image responsive */
    border-radius: 8px; /* Add border radius */
  }

  .publication-info {
    margin-left: 10px; /* Add margin to separate image and title */
  }

  .publication h4 {
    margin-top: 0; /* Remove default margin */
  }

  .publication-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
  }

  .publication-container .col-md-6 {
    width: 48%;
  }
</style>

<div class="row g-5 mb-5">
  <div class="col-md-6"> <!-- Two columns -->
    <h3 class="fw-bold border-bottom pb-3 mb-5">Publications</h3>
    <div class="publication-container">
      {% if page.title == "Home" %}
        {% for item in site.data.publications.featured %}
          <div class="publication">
            <img src="{{ site.github.url }}/{{ item.image }}" alt="Publication Image"> <!-- Add image -->
            <div class="publication-info">
              <h4>{{ item.name }}</h4> <!-- Change from <p> to <h4> for publication title -->
              <button class="button"><a href="{{ site.github.url }}/{{ item.urlpdf }}">pdf</a></button>
              <button class="button"><a href="{{ site.github.url }}/{{ item.urlbib }}">bib</a></button>
            </div>
          </div>
        {% endfor %}
      {% else %}
        {% for item in site.data.publications.index %}
          <div class="publication">
            <img src="{{ site.github.url }}/{{ item.image }}" alt="Publication Image"> <!-- Add image -->
            <div class="publication-info">
              <h4>{{ item.name }}</h4> <!-- Change from <p> to <h4> for publication title -->
              <button class="button"><a href="{{ site.github.url }}/{{ item.urlpdf }}">pdf</a></button>
              <button class="button"><a href="{{ site.github.url }}/{{ item.urlbib }}">bib</a></button>
            </div>
          </div>
        {% endfor %}
      {% endif %}
    </div>
  </div>
</div>
