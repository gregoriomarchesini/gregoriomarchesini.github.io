<style>
  .button {
    background-color: azure;
    border: 1px solid black;
    color: black;
    padding: 10px 15px;
    text-align: center;
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
  }

  .button:hover {
    background-color: white;
    color: black;
  }

  .publication {
    display: inline-block;
    margin-right: 20px;
  }

  .publication h4, .publication h5 {
    margin: 5px 0;
  }

  .publication-container {
    display: inline;
  }
</style>

<div>
  <h3>Publications</h3>
  <div class="publication-container">
    {% if page.title == "Home" %}
      {% for item in site.data.publications.featured %}
        <div class="publication">
          <h4>{{ item.name }}</h4>
          <h5>{{ item.title }}</h5>
          <button class="button">
            <a href="{{ site.github.url }}/{{ item.urlpdf }}" target="_blank">pdf</a>
          </button>
          <button class="button">
            <a href="{{ site.github.url }}/{{ item.urlbib }}" target="_blank">bib</a>
          </button>
        </div>
      {% endfor %}
    {% else %}
      {% for item in site.data.publications.index %}
        <div class="publication">
          <h4>{{ item.name }}</h4>
          <h5>{{ item.title }}</h5>
          <button class="button">
            <a href="{{ site.github.url }}/{{ item.urlpdf }}" target="_blank">pdf</a>
          </button>
          <button class="button">
            <a href="{{ site.github.url }}/{{ item.urlbib }}" target="_blank">bib</a>
          </button>
        </div>
      {% endfor %}
    {% endif %}
  </div>
</div>
