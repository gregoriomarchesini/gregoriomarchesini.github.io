<style>
  .button {
    background-color: azure;
    border: 1px solid black;
    color: black;
    padding: 10px 15px;
    text-align: center;
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
  }

  .button:hover {
    background-color: white;
    color: black;
  }

  .publication {
    display: inline-block;
    margin-right: 20px;
  }

  .publication h4, .publication h5 {
    margin: 5px 0;
  }

  .publication-container {
    display: inline;
  }
</style>

<div>
  <h3>Publications</h3>
  <div class="publication-container">
    {% for item in site.data.publications %}
      <div class="publication">
        <h4>{{ item.title }}</h4>
        <h5>{{ item.name }}</h5>
        <button class="button">
          <a href="{{ item.urlpdf }}" target="_blank">pdf</a>
        </button>
        <button class="button">
          <a href="{{ item.urlbib }}" target="_blank">bib</a>
        </button>
      </div>
    {% endfor %}
  </div>
</div>
